<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testable Todo Card | Stage 0 Task</title>
    <meta name="description" content="A highly accessible and testable Todo Item Card built for HNG Internship Stage 0.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">
            <!-- Priority Indicator (Background Tint) -->
            <div class="priority-indicator" data-testid="test-todo-priority-indicator"></div>

            <!-- View Mode -->
            <div id="view-mode">
                <header class="todo-header">
                    <div class="priority-status-row">
                        <span class="badge priority" data-testid="test-todo-priority" aria-label="Priority: High">High 🔥</span>
                        <div class="status-wrapper">
                            <span class="badge status" data-testid="test-todo-status" aria-label="Current Status: Pending">Pending ⏳</span>
                            <select class="status-control" data-testid="test-todo-status-control" aria-label="Change Task Status">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Done">Done</option>
                            </select>
                        </div>
                    </div>
                    <div class="title-row">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="todo-toggle" data-testid="test-todo-complete-toggle" aria-labelledby="todo-title">
                            <label for="todo-toggle" class="custom-checkbox" aria-hidden="true"></label>
                        </div>
                        <h3 class="todo-title" id="todo-title" data-testid="test-todo-title">Squash the Memory Leak in Prod 🐛</h3>
                    </div>
                </header>

                <section class="todo-body">
                    <div id="collapsible-content" class="collapsible-section" data-testid="test-todo-collapsible-section">
                        <p class="todo-description" data-testid="test-todo-description">
                            A rogue memory leak has been silently crashing the auth service every 6 hours. Reproduce, profile, patch, and ship a hotfix before the next incident window.
                        </p>
                    </div>
                    <button class="expand-btn" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="collapsible-content">
                        Show more
                    </button>
                    
                    <div class="tags-container">
                        <ul class="tags-list" data-testid="test-todo-tags" role="list">
                            <li class="tag" data-testid="test-todo-tag-work">Work 💻</li>
                            <li class="tag" data-testid="test-todo-tag-urgent">Urgent 🚨</li>
                            <li class="tag">Backend 🔧</li>
                        </ul>
                    </div>
                </section>

                <footer class="todo-footer">
                    <div class="time-info">
                        <div class="due-date-row">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            <time class="due-date" data-testid="test-todo-due-date" datetime="2026-04-15T18:00">Due April 15, 2026</time>
                        </div>
                        <div class="time-remaining-row" aria-live="polite">
                            <span class="overdue-badge" data-testid="test-todo-overdue-indicator" hidden>Overdue</span>
                            <time class="time-remaining" data-testid="test-todo-time-remaining">Calculating...</time>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn-icon" data-testid="test-todo-edit-button" aria-label="Edit Task">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="btn-icon btn-delete" data-testid="test-todo-delete-button" aria-label="Delete Task">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                </footer>
            </div>

            <!-- Edit Mode -->
            <form id="edit-mode" data-testid="test-todo-edit-form" hidden>
                <div class="form-group">
                    <label for="edit-title">Task Title</label>
                    <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" required>
                </div>
                <div class="form-group">
                    <label for="edit-description">Description</label>
                    <textarea id="edit-description" data-testid="test-todo-edit-description-input" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-priority">Priority</label>
                        <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-due-date">Due Date</label>
                        <input type="datetime-local" id="edit-due-date" data-testid="test-todo-edit-due-date-input">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-testid="test-todo-cancel-button">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-testid="test-todo-save-button">Save Changes</button>
                </div>
            </form>
        </article>
    </main>
    <script src="script.js"></script>
</body>
</html>
